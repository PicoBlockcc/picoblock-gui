name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: picoblock-gui

    steps:
      - name: Checkout picoblock-gui
        uses: actions/checkout@v4
        with:
          path: picoblock-gui

      - name: Checkout picoblock-vm
        uses: actions/checkout@v4
        with:
          repository: PicoBlockcc/picoblock-vm
          path: picoblock-vm

      - name: Checkout picoblock-blocks
        uses: actions/checkout@v4
        with:
          repository: PicoBlockcc/picoblock-blocks
          path: picoblock-blocks

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Check picoblock-blocks in node_modules
        run: ls node_modules/picoblock-blocks/ | head -20

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: picoblock-gui/build
          enable_jekyll: false
